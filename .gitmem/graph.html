<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cognee Knowledge Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000000;--bg2:#323332;--surface:rgba(255,255,255,0.06);
  --border:rgba(219,216,216,0.12);--text:#F4F4F4;--text2:#DBD8D8;
  --accent:#6510F4;--accent2:#A550FF;--green:#0DFF00;
  --schema-node:#1a1a2e;--schema-stroke:#A550FF;--schema-link:#555;
}
html.light{
  --bg:#f5f5f5;--bg2:#e8e8e8;--surface:rgba(0,0,0,0.04);
  --border:rgba(0,0,0,0.12);--text:#1a1a1a;--text2:#555555;
  --accent:#6510F4;--accent2:#7c3aed;--green:#16a34a;
  --schema-node:#ffffff;--schema-stroke:#6510F4;--schema-link:#999;
}
html.light body,html.light{background:var(--bg);color:var(--text)}
@font-face{font-family:'Inter';src:local('Inter'),local('Inter-Regular');font-display:swap}
body,html{width:100%;height:100%;overflow:hidden;background:#000000;color:#F4F4F4;font-family:'Inter',system-ui,-apple-system,sans-serif}
canvas{display:block;width:100vw;height:100vh;cursor:grab}
canvas:active{cursor:grabbing}

#header{
  position:fixed;top:0;left:0;right:0;height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;z-index:100;
  background:none;
  pointer-events:none;
}
#header>*{pointer-events:auto}
.logo{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:0.02em;color:var(--text)}
.logo img{height:28px;width:auto}
.stats{display:flex;gap:16px;font-size:11px;color:var(--text2);font-variant-numeric:tabular-nums}
.stats span{display:flex;align-items:center;gap:4px}
.stats .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

#controls{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:100;
  display:flex;gap:2px;padding:4px;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
}
.ctrl-btn{
  padding:6px 14px;font-size:11px;font-weight:500;font-family:inherit;
  color:var(--text2);background:transparent;border:none;border-radius:7px;
  cursor:pointer;transition:all 0.15s ease;white-space:nowrap;
}
.ctrl-btn:hover{color:var(--text);background:var(--surface)}
.ctrl-btn.active{color:#F4F4F4;background:rgba(101,16,244,0.2)}
.ctrl-btn:disabled{opacity:0.35;cursor:not-allowed}
.ctrl-btn:disabled:hover{color:var(--text2);background:transparent}
.ctrl-sep{width:1px;background:var(--border);margin:2px 4px}

#search-box{
  position:fixed;top:56px;left:20px;z-index:100;width:280px;
}
#search-input{
  width:100%;padding:8px 64px 8px 32px;
  font-size:12px;font-family:inherit;color:var(--text);
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  outline:none;transition:border-color 0.15s;
}
#search-count{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  font-size:10.5px;color:var(--text2);pointer-events:none;
  font-variant-numeric:tabular-nums;white-space:nowrap;
}
#search-input:focus{border-color:var(--accent)}
#search-input::placeholder{color:var(--text2)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text2);pointer-events:none}

#info-panel{
  position:fixed;top:56px;right:20px;width:320px;max-height:calc(100vh - 80px);
  overflow-y:auto;z-index:100;
  background:var(--bg2);border:1px solid var(--border);border-radius:12px;
  padding:16px;opacity:0;transform:translateX(8px);
  transition:opacity 0.2s ease,transform 0.2s ease;
}
#info-panel.visible{opacity:1;transform:translateX(0)}
#info-panel::-webkit-scrollbar{width:4px}
#info-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-header{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.panel-type{
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;
  padding:2px 6px;border-radius:4px;background:rgba(101,16,244,0.2);color:#A550FF;
}
.panel-title{font-size:14px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.panel-section-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--text2);margin-bottom:8px}
.panel-row{display:flex;justify-content:space-between;align-items:flex-start;padding:3px 0;font-size:12px;gap:12px}
.panel-row .k{color:var(--text2);flex-shrink:0}
.panel-row .v{color:var(--text);text-align:right;word-break:break-word;max-width:200px}

/* ── Legend (Phase 1 polish) ─────────────────────────────────────
   Bottom-left floating card explaining the encodings: node colors by
   stage, the ontology-valid green ring, and the importance-weight node-
   size scale. Populated by JS so only stages actually present in the
   graph appear. */
#legend{
  position:fixed;bottom:20px;left:20px;z-index:90;
  background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:10px 14px;font-size:11px;line-height:1.5;color:var(--text2);
  max-width:380px;
  display:flex;gap:14px;align-items:center;flex-wrap:wrap;
}
.legend-section{display:flex;align-items:center;gap:8px;}
.legend-title{font-size:9.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--text2);opacity:0.75;margin-right:2px;}
.legend-items{display:flex;gap:9px;align-items:center;flex-wrap:wrap;}
.legend-item{display:inline-flex;align-items:center;gap:4px;color:var(--text);}
.legend-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.legend-ring{
  display:inline-block;width:11px;height:11px;border-radius:50%;
  background:var(--bg);border:2px solid #0DFF00;flex-shrink:0;
}
.legend-ring.memory{border:2px dashed #FFC53D;}
.legend-sizes{display:inline-flex;align-items:center;gap:4px;}
.legend-sizes .legend-dot{background:var(--text);}
.legend-sep{width:1px;height:18px;background:var(--border);}

.empty-state{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;color:var(--text2);font-size:14px;
}

#loading-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;
  background:rgba(0,0,0,0.92);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.4s ease;
}
#loading-overlay.hidden{opacity:0;pointer-events:none}
#loading-text{font-size:14px;color:var(--text2);margin-bottom:16px}
#loading-bar-bg{width:240px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
#loading-bar{width:0%;height:100%;background:var(--accent);border-radius:2px;transition:width 0.15s linear}
#loading-stats{font-size:11px;color:var(--text2);margin-top:10px;opacity:0.7}

#minimap-container{
  position:fixed;bottom:64px;right:20px;z-index:100;
  border:1px solid var(--border);border-radius:8px;overflow:hidden;
  background:rgba(0,0,0,0.7);cursor:pointer;display:none;
}
#minimap-canvas{display:block}

#fps-counter{
  position:fixed;top:12px;right:180px;z-index:100;
  font-size:10px;color:var(--text2);font-variant-numeric:tabular-nums;
  display:none;pointer-events:none;
}
</style>
</head>
<body>

<div id="view-tabs" style="position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:1100;display:flex;gap:2px;align-items:center;background:var(--bg);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:2px 6px;">
  <button class="tab-btn active" data-view="graph" style="background:#1F9E6E;color:#fff;border:none;padding:6px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;">Graph</button>
  <button class="tab-btn" data-view="schema" style="background:transparent;color:var(--text2);border:none;padding:6px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;">Schema</button>
  <button class="tab-btn" data-view="memory" style="background:transparent;color:var(--text2);border:none;padding:6px 18px;border-radius:6px 6px 0 0;cursor:pointer;font-size:12px;font-weight:600;">Memory</button>
</div>

<button id="theme-toggle" style="position:fixed;top:12px;right:20px;z-index:1200;background:var(--bg2);border:1px solid var(--border);cursor:pointer;font-size:12px;padding:6px 14px;border-radius:8px;color:var(--text);font-family:inherit;font-weight:500;transition:all 0.15s;">Dark mode</button>

<div id="search-box">
  <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
  <input type="text" id="search-input" placeholder="Search nodes... (Enter jumps to match)" autocomplete="off" spellcheck="false">
  <span id="search-count"></span>
</div>

<div id="controls">
  <button class="ctrl-btn active" data-labelbudget="key" title="Labels: landmark nodes + high-importance entities">Key</button>
  <button class="ctrl-btn" data-labelbudget="all" title="Labels: every node">All</button>
  <button class="ctrl-btn" data-labelbudget="off" title="Labels: hidden (hover to peek)">Off</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn active" data-layout="story" title="Story: fixed pipeline columns (Documents &rarr; Chunks &rarr; Entities &rarr; Types &rarr; Summaries). Nodes stay pinned in a readable grid.">Story</button>
  <button class="ctrl-btn" data-layout="ranked" title="Flow: columns by processing order; vertical position settles by connectivity, so related nodes drift together.">Flow</button>
  <button class="ctrl-btn" data-layout="organic" title="Force: no columns &mdash; a physics simulation pulls connected nodes together so clusters emerge. Drag nodes to rearrange.">Force</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn active" data-colorby="type" title="Color by node type">Type</button>
  <button class="ctrl-btn" data-colorby="nodeset" title="Color by source node set">Node set</button>
  <button class="ctrl-btn" data-colorby="user" title="Color by source user">User</button>
  <div class="ctrl-sep"></div>
  <button class="ctrl-btn" id="btn-zoom-out" title="Zoom out (-)">&#x2212;</button>
  <button class="ctrl-btn" id="btn-zoom-in" title="Zoom in (+)">+</button>
  <button class="ctrl-btn" id="btn-fit" title="Fit to view (F)">Fit</button>
</div>
<!-- Legacy data-layer buttons (Nodes/Edges/Labels/Heatmap/Type Clouds)
     removed for simplicity. The label visibility is fully controlled by
     the Key/All/Off budget above; node/edge visibility were never useful
     toggles in practice; heatmap and type-cloud layers stay reachable
     via the layers={} state object for power users / URL hash. -->

<script>
// Theme toggle
(function(){
  const btn = document.getElementById('theme-toggle');

  // Apply a theme everywhere it matters: CSS class, JS flag (read by the
  // canvas draw loop), button label, tab bar, the canvas itself (which only
  // repaints on interaction — without an explicit frame the 95% of the
  // screen that is canvas stayed in the old theme until the next pan), and
  // the schema SVG when visible.
  function applyTheme(isLight) {
    window._isLightMode = isLight;
    document.documentElement.classList.toggle('light', isLight);
    btn.textContent = isLight ? 'Dark mode' : 'Light mode';
    const tabBar = document.getElementById('view-tabs');
    if (tabBar) tabBar.style.background = isLight ? '#f5f5f5' : '#000000';
    if (window._requestGraphRedraw) window._requestGraphRedraw();
    if (document.getElementById('schema-view').style.display !== 'none' && window._renderSchemaGraph) {
      window._renderSchemaGraph(true);  // preserve pan/zoom across the re-render
    }
    const memoryViewEl = document.getElementById('memory-view');
    if (memoryViewEl && memoryViewEl.style.display !== 'none' && window._renderMemoryView) {
      window._renderMemoryView(true);  // preserve pan/zoom across the re-render
    }
  }

  // Restore the user's last choice (default light). Syncing the CSS class on
  // load also fixes the original bug: the page shipped dark :root variables
  // while the JS assumed light, so the first toggle was a visual no-op.
  let stored = null;
  try { stored = localStorage.getItem('cognee-viz-theme'); } catch (e) { /* file:// may block */ }
  applyTheme(stored ? stored === 'light' : true);

  btn.addEventListener('click', () => {
    const isLight = !window._isLightMode;
    try { localStorage.setItem('cognee-viz-theme', isLight ? 'light' : 'dark'); } catch (e) { /* best effort */ }
    applyTheme(isLight);
  });
})();

// Tab switching logic
(function(){
  const tabs = document.querySelectorAll('.tab-btn');
  const graphView = document.getElementById('graph-view');
  const schemaView = document.getElementById('schema-view');
  const memoryView = document.getElementById('memory-view');
  tabs.forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.forEach(t => { t.style.background='transparent'; t.style.color='var(--text2)'; t.classList.remove('active'); });
      btn.style.background='#1F9E6E'; btn.style.color='#fff'; btn.classList.add('active');
      const view = btn.dataset.view;
      graphView.style.display = view === 'graph' ? '' : 'none';
      schemaView.style.display = view === 'schema' ? '' : 'none';
      if (memoryView) memoryView.style.display = view === 'memory' ? '' : 'none';
      if (view === 'schema' && window._renderSchemaGraph) window._renderSchemaGraph();
      if (view === 'memory' && window._renderMemoryView) window._renderMemoryView();
    });
  });
})();

  // ── Build the schema model from preprocessor data ────────────────
  function buildSchemaModel() {

      return { nodeTypes: [], edgeTypes: [] };

    const nodeTypes = [];
    const edgeTypes = [];

    window._schemaInstancesByType = (schemaGraphData && schemaGraphData.instances_by_type) || {};

    window._schemaOperationLinks = (schemaGraphData && schemaGraphData.operation_links) || [];

          name: String(n.name || n.id),
          rank: Number.isFinite(Number(n.rank)) ? Number(n.rank) : 4,
          fields: Array.isArray(n.fields) ? n.fields : [],
          instance_count: n.instance_count != null ? n.instance_count : null,
          source_pipeline: n.source_pipeline || null,
          source_task: n.source_task || null,
          source_user: n.source_user || null,
          // PR2 contract: bounded instance display-names + sample size.

          relationship_label: n.relationship_label || '',

  // Returns a map of type-name → {x, y, w, h, type} and metadata for the
  // overall diagram bounds.
  // Layout sizing — exported so the renderer draws the same header/card metrics.
  const LAYOUT = {
    PAD_LEFT: 56, PAD_TOP: 64, BOX_W: 212, COL_GAP: 128, ROW_GAP: 44,
    HEADER_H: 42, CARD_H: 27, MORE_H: 20, BOTTOM_PAD: 12, MAX_CARDS: 5, LENS_H: 66,

  // A type box grows to fit its instance mini-cards (capped at MAX_CARDS unless
  // expanded); a lensed single-instance box stays compact.
  function boxHeight(t) {
    if (t.instance_count == null) return LAYOUT.LENS_H;

    const total = t.instance_count || insts.length || 0;
    if (!total) return LAYOUT.LENS_H;
    const shown = isTypeExpanded(t.name)
      ? Math.min(insts.length, total)
      : Math.min(total, LAYOUT.MAX_CARDS);
    const more = total > LAYOUT.MAX_CARDS ? LAYOUT.MORE_H : 0;  // room for the expand/collapse toggle
    return LAYOUT.HEADER_H + shown * LAYOUT.CARD_H + more + LAYOUT.BOTTOM_PAD;
  }

  function layoutBoxes(nodeTypes, totalWidth) {
    const { PAD_LEFT, PAD_TOP, BOX_W, COL_GAP, ROW_GAP } = LAYOUT;
    const byRank = {};
    nodeTypes.forEach(function(t) {
      const r = Math.round(t.rank);
      if (!byRank[r]) byRank[r] = [];
      byRank[r].push(t);
    });
    const ranks = Object.keys(byRank).map(Number).sort(function(a, b) { return a - b; });
    const positions = {};
    let maxY = 0;
    ranks.forEach(function(r, colIdx) {
      const colX = PAD_LEFT + colIdx * (BOX_W + COL_GAP);
      let y = PAD_TOP;
      byRank[r].forEach(function(t) {
        const h = boxHeight(t);
        positions[t.name] = { x: colX, y: y, w: BOX_W, h: h, type: t, rank: r };
        if (y + h > maxY) maxY = y + h;

      });
    });

      width: diagramW,
      height: diagramH,

      box_w: BOX_W,
      pad_left: PAD_LEFT,
      col_gap: COL_GAP,

  // Pick a connection point on the box perimeter aimed at a target point.
  // Keeps arrows from emerging out of the middle of a box.
  function boxAnchor(box, towardX, towardY) {
    const cx = box.x + box.w / 2;
    const cy = box.y + box.h / 2;
    const dx = towardX - cx;
    const dy = towardY - cy;
    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) return { x: cx, y: cy };
    const halfW = box.w / 2;
    const halfH = box.h / 2;
    const slope = Math.abs(dy / (dx || 0.001));
    if (slope * halfW < halfH) {
      // Exits left/right side
      const sign = dx > 0 ? 1 : -1;
      return { x: cx + sign * halfW, y: cy + sign * halfW * (dy / (dx || 0.001)) };
    }
    const sign = dy > 0 ? 1 : -1;
    return { x: cx + sign * halfH * (dx / (dy || 0.001)), y: cy + sign * halfH };
  }

        .attr('stop-color', accentForName(de.edge.target_type));

        .datum(de.edge)
        .attr('class', 'sd-edge-path')
        .attr('data-edge-id', de.edge.id)

        .attr('class', 'sd-edge-label-bg')
        .attr('data-edge-id', de.edge.id)

        .attr('y', de.labelY - bbox.height / 2 - 1)
        .attr('width', bbox.width + pad * 2)
        .attr('height', bbox.height + 2)

        .attr('dominant-baseline', 'central')
        .text(labelText);
    });

    // ── Node-type boxes ────────────────────────────────────────────
    const nodeGroup = root.append('g').attr('class', 'sd-nodes');
    Object.keys(positions).forEach(function(name) {
      const p = positions[name];
      const t = p.type;
      const accent = accentForName(name);
      // Record the box rect for the spotlight overlay (fallback anchor).
      window._boxRectByType[name] = { x: p.x, y: p.y, w: p.w, h: p.h };

      const g = nodeGroup.append('g')
        .attr('class', 'sd-node-box')
        .attr('data-node-type', name)
        .attr('data-node-id', t.id || '')
        .attr('transform', 'translate(' + p.x + ',' + p.y + ')');

      // Card body — soft themed card with a gentle drop shadow.
      g.append('rect')
        .attr('width', p.w)
        .attr('height', p.h)
        .attr('rx', 14)
        .attr('fill', P.card)
        .attr('stroke', P.cardBorder)
        .attr('stroke-width', 1)
        .attr('filter', 'url(#sd-card-shadow)');

      if (t.instance_count == null) {
        // Single-instance card: the instance name is the headline.
        g.append('circle').attr('cx', 21).attr('cy', 25).attr('r', 5).attr('fill', accent);
        g.append('text').attr('x', 34).attr('y', 30)
          .attr('font-size', 14.5).attr('font-weight', 700).attr('fill', P.title)
          .text(truncate(name, 15));
        return;
      }

      // Type card: the column header above already names the category, so the
      // type label is small + muted — the instance mini-cards are the focus.
      g.append('circle').attr('cx', 18).attr('cy', 22).attr('r', 4).attr('fill', accent);
      g.append('text').attr('x', 30).attr('y', 25.5)
        .attr('font-size', 10.5).attr('font-weight', 700).attr('letter-spacing', '0.04em')
        .attr('fill', P.muted)
        .text(truncate(String(name).toUpperCase(), 18));

      // Count pill (top-right).
      const cstr = String(t.instance_count);
      const pw = 16 + cstr.length * 8;
      g.append('rect')
        .attr('x', p.w - 14 - pw).attr('y', 13)
        .attr('width', pw).attr('height', 19).attr('rx', 9.5)
        .attr('fill', P.pill);
      g.append('text')
        .attr('x', p.w - 14 - pw / 2).attr('y', 26.5)
        .attr('text-anchor', 'middle')
        .attr('font-size', 11).attr('font-weight', 600).attr('fill', P.pillText)
        .text(cstr);

      // "Modified by operations" badge (amber dot) — see the Transformations layer.
      if (modifiedTypes.has(name)) {
        const dot = g.append('circle')
          .attr('cx', p.w - 14 - pw - 11).attr('cy', 22.5).attr('r', 3.5)
          .attr('fill', '#F2994A');
        dot.append('title').text('Modified by transformation operations');
      }

      // Instance mini-cards — capped at MAX_CARDS unless this type is expanded.
      const insts = instancesForType(name);
      const expanded = isTypeExpanded(name);
      const limit = expanded ? insts.length : LAYOUT.MAX_CARDS;
      insts.slice(0, limit).forEach(function(inst, i) {
        const cy = LAYOUT.HEADER_H + i * LAYOUT.CARD_H;
        window._miniCardRects[inst.id] =
          { x: p.x + 13, y: p.y + cy, w: p.w - 26, h: LAYOUT.CARD_H - 6 };
        const card = g.append('g')
          .attr('class', 'sd-mini-card')
          .attr('data-iid', inst.id);
        card.append('rect')
          .attr('x', 13).attr('y', cy)
          .attr('width', p.w - 26).attr('height', LAYOUT.CARD_H - 6)
          .attr('rx', 7)
          .attr('fill', P.mini)
          .attr('stroke', P.miniBorder)
          .attr('stroke-width', 1);
        card.append('text')
          .attr('x', 25).attr('y', cy + (LAYOUT.CARD_H - 6) / 2 + 4)
          .attr('font-size', 11.5)
          .attr('fill', P.miniText)
          .text(truncate(inst.name || inst.id, 24));
      });
      const total = t.instance_count || insts.length;
      if (total > LAYOUT.MAX_CARDS) {
        const shownCount = Math.min(limit, insts.length);
        const my = LAYOUT.HEADER_H + shownCount * LAYOUT.CARD_H;
        const toggle = g.append('g')
          .attr('class', 'sd-expand-toggle')
          .attr('data-type', name);
        // Invisible hit area so the whole toggle row is clickable.
        toggle.append('rect')
          .attr('x', 13).attr('y', my).attr('width', p.w - 26).attr('height', 16)
          .attr('fill', 'transparent');
        toggle.append('text')
          .attr('x', 21).attr('y', my + 12)
          .attr('font-size', 11).attr('font-weight', 600).attr('fill', '#1F9E6E')
          .text(expanded ? 'Show less' : ('+ ' + (total - LAYOUT.MAX_CARDS) + ' more'));
      }
    });

    // ── Transformation operation rail (impact-layer) ────────────────
    window._opRects = {};
    const ops = window._schemaOperations || [];
    if (window._schemaShowOps && ops.length) {
      const xs = Object.keys(positions).map(function(k) { return positions[k].x; });
      const minX = xs.length ? Math.min.apply(null, xs) : LAYOUT.PAD_LEFT;
      const maxRight = (xs.length ? Math.max.apply(null, xs) : 800) + LAYOUT.BOX_W;
      const railY = -120, chipW = 150, chipH = 30;
      const availW = Math.max(maxRight - minX, ops.length * (chipW + 16));
      const opGroup = root.append('g').attr('class', 'sd-op-rail');
      ops.forEach(function(op, i) {
        const x = minX + i * (availW / ops.length);
        window._opRects[op.id] = { x: x, y: railY, w: chipW, h: chipH };
        const kindColor = OP_KIND_COLORS[op.op_kind] || '#8792A2';
        const g = opGroup.append('g').attr('class', 'sd-op-chip').attr('data-op', op.id);
        g.append('rect').attr('x', x).attr('y', railY).attr('width', chipW).attr('height', chipH)
          .attr('rx', 8).attr('fill', P.card).attr('stroke', kindColor).attr('stroke-width', 1.5)
          .attr('filter', 'url(#sd-card-shadow)');
        g.append('circle').attr('cx', x + 13).attr('cy', railY + chipH / 2).attr('r', 4).attr('fill', kindColor);
        g.append('text').attr('x', x + 24).attr('y', railY + chipH / 2 + 4)
          .attr('font-size', 11.5).attr('font-weight', 600).attr('fill', P.title)
          .text(truncate(op.name, 16));
      });
    }

    // ── Selection wiring ───────────────────────────────────────────
    let selected = null;
    const selectionEl = document.getElementById('schema-selection');
    function applySelection() {
      svg.selectAll('.sd-node-box').classed('is-dim', false);
      svg.selectAll('.sd-edge-path').classed('is-hot', false).classed('is-dim', false);
      svg.selectAll('.sd-edge-label-bg').classed('is-hot', false).classed('is-dim', false);
      svg.selectAll('.sd-edge-label').classed('is-dim', false);
      if (selectionEl) selectionEl.textContent = '';
      if (!selected) return;

      if (selected.kind === 'node') {
        const name = selected.name;
        svg.selectAll('.sd-node-box').classed('is-dim', function() { return this.dataset.nodeType !== name; });
        svg.selectAll('.sd-edge-path').classed('is-hot', function() {
          return this.dataset.sourceType === name || this.dataset.targetType === name;
        }).classed('is-dim', function() {
          return this.dataset.sourceType !== name && this.dataset.targetType !== name;
        });
        svg.selectAll('.sd-edge-label-bg').each(function() {
          const id = this.getAttribute('data-edge-id');
          const path = svg.select('.sd-edge-path[data-edge-id="' + id + '"]').node();
          if (path) {
            this.classList.toggle('is-hot', path.classList.contains('is-hot'));
            this.classList.toggle('is-dim', path.classList.contains('is-dim'));
          }
        });
        svg.selectAll('.sd-edge-label').each(function() {
          const id = this.getAttribute('data-edge-id');
          const path = svg.select('.sd-edge-path[data-edge-id="' + id + '"]').node();
          if (path) this.classList.toggle('is-dim', path.classList.contains('is-dim'));
        });
        if (selectionEl) selectionEl.textContent = 'Selected node type: ' + name + ' — click again to clear';
      } else if (selected.kind === 'edge') {
        const id = selected.id;
        const edgePath = svg.select('.sd-edge-path[data-edge-id="' + id + '"]');
        const sourceType = edgePath.attr('data-source-type');
        const targetType = edgePath.attr('data-target-type');
        svg.selectAll('.sd-node-box').classed('is-dim', function() {
          return this.dataset.nodeType !== sourceType && this.dataset.nodeType !== targetType;
        });
        svg.selectAll('.sd-edge-path').classed('is-dim', function() { return this.getAttribute('data-edge-id') !== id; });
        edgePath.classed('is-dim', false).classed('is-hot', true);
        svg.select('.sd-edge-label-bg[data-edge-id="' + id + '"]').classed('is-hot', true);
        if (selectionEl) selectionEl.textContent = 'Selected edge: ' + sourceType + ' → ' + targetType + ' — click again to clear';
      }
    }
    svg.selectAll('.sd-node-box').on('click', function() {
      const name = this.dataset.nodeType;
      // A type-box click is a type-level selection; clear any instance spotlight.
      if (window._schemaSpotlight) { window._schemaSpotlight = null; clearSpotlight(); }
      if (selected && selected.kind === 'node' && selected.name === name) {
        selected = null;
        if (window._hideSchemaInspector) window._hideSchemaInspector();
        updateSchemaStatus(null);
      } else {
        selected = { kind: 'node', name: name };
        // Open the type inspector side panel for the clicked type.
        if (window._showSchemaInspector) window._showSchemaInspector(name);
      }
      applySelection();
    });
    // Instance mini-cards: click focuses the diagram on that instance and opens
    // its inspector (stop propagation so the parent type box doesn't also fire).
    svg.selectAll('.sd-mini-card').on('click', function(event) {
      if (event) event.stopPropagation();
      const iid = this.dataset.iid;
      if (!iid) return;
      if (window._showSchemaInstanceInspector) window._showSchemaInstanceInspector(iid);
      if (window._focusSchemaInstance) window._focusSchemaInstance(iid);
    });
    // Click an operation chip → spotlight the types it transforms.
    svg.selectAll('.sd-op-chip').on('click', function(event) {
      if (event) event.stopPropagation();
      const opId = this.dataset.op;
      if (opId) applyOpSpotlight(opId);
    });
    // Expand / collapse the instance list inside a type box.
    svg.selectAll('.sd-expand-toggle').on('click', function(event) {
      if (event) event.stopPropagation();
      const tp = this.dataset.type;
      window._schemaExpanded = window._schemaExpanded || {};
      window._schemaExpanded[tp] = !window._schemaExpanded[tp];
      window._renderSchemaGraph(true);  // re-layout, preserving the current pan/zoom
    });
    svg.selectAll('.sd-edge-path, .sd-edge-label-bg, .sd-edge-label').on('click', function() {
      const id = this.getAttribute('data-edge-id');
      if (!id) return;
      if (selected && selected.kind === 'edge' && selected.id === id) { selected = null; }
      else { selected = { kind: 'edge', id: id }; }
      applySelection();
    });

    // ── Pan / zoom on the schema canvas ─────────────────────────────
    schemaSvgSel = svg;
    schemaRootSel = root;
    schemaZoomBehavior = d3.zoom()
      .scaleExtent([0.2, 3])
      .on('start', function() { svg.classed('is-panning', true); })
      .on('zoom', function(event) { root.attr('transform', event.transform); })
      .on('end', function() { svg.classed('is-panning', false); });
    svg.call(schemaZoomBehavior).on('dblclick.zoom', null);
    if (savedTransform) {
      // Preserve the current pan/zoom across re-renders (e.g. expand/collapse).
      svg.call(schemaZoomBehavior.transform, savedTransform);
    } else {
      // Initial framing: fit the whole diagram into the viewport.
      fitSchema(null, false);
    }
  }


  // ── Empty / non-empty state plumbing ─────────────────────────────
  function setSchemaEmpty(message) {
    emptyEl.style.display = 'flex';
    emptyEl.querySelector('div').textContent = message || 'No schema configured for this dataset.';
    if (svgEl) svgEl.style.display = 'none';
    const hdr = document.getElementById('schema-header');
    const dia = document.getElementById('schema-diagram-section');
    if (hdr) hdr.style.display = 'none';
    if (dia) dia.style.display = 'none';
  }
  function hideSchemaEmpty() {
    emptyEl.style.display = 'none';
    if (svgEl) svgEl.style.display = '';
    const hdr = document.getElementById('schema-header');
    const dia = document.getElementById('schema-diagram-section');
    if (hdr) hdr.style.display = '';
    if (dia) dia.style.display = '';
  }

  // ── Pan / zoom ───────────────────────────────────────────────────
  // d3.zoom on the SVG, applied to the root <g>, so the schema can be panned
  // and zoomed like the graph view. Fit accounts for the side panel so the
  // spotlighted connections land in the visible area, not under the panel.
  let schemaSvgSel = null, schemaRootSel = null, schemaZoomBehavior = null;

  function panelOffset() {
    const panel = document.getElementById('schema-side-panel');
    return panel && panel.style.display !== 'none' ? (panel.offsetWidth || 344) : 0;
  }

  function fitSchema(bbox, animate) {
    if (!schemaSvgSel || !schemaRootSel || !schemaZoomBehavior) return;
    const node = schemaSvgSel.node();
    const W = node.clientWidth || node.getBoundingClientRect().width || 1200;
    const H = node.clientHeight || node.getBoundingClientRect().height || 700;
    const avail = Math.max(240, W - panelOffset());
    if (!bbox) {
      try { bbox = schemaRootSel.node().getBBox(); } catch (e) { return; }
    }
    const pad = 44;
    const bw = bbox.width || 1, bh = bbox.height || 1;
    const scale = Math.max(0.2, Math.min((avail - pad * 2) / bw, (H - pad * 2) / bh, 1.5));
    const tx = pad + (avail - pad * 2 - bw * scale) / 2 - bbox.x * scale;
    const ty = pad + (H - pad * 2 - bh * scale) / 2 - bbox.y * scale;
    const t = d3.zoomIdentity.translate(tx, ty).scale(scale);
    const target = animate ? schemaSvgSel.transition().duration(420) : schemaSvgSel;
    target.call(schemaZoomBehavior.transform, t);
  }

  // ── Instance spotlight ───────────────────────────────────────────
  // Clicking an instance keeps the full diagram and spotlights that instance's
  // connections: its card + linked cards pop, everything else dims, and glowing
  // connector edges are drawn from it to its neighbours. window._schemaSpotlight
  // holds the focused instance id (or null).
  window._schemaSpotlight = null;

  // ── Transformation impact-layer ──────────────────────────────────
  // Operations (cognify, memify, improve, …) shown as a rail of chips with
  // color-coded edges to the schema types they affect. Off by default.
  window._schemaShowOps = window._schemaShowOps || false;
  window._opRects = window._opRects || {};
  const EFFECT_COLORS = {
    produces: '#1F9E6E', enriches: '#2F80ED', modifies: '#F2994A', removes: '#EB5757',
  };
  const EFFECT_DASH = { modifies: '6 4', removes: '6 4' };
  const OP_KIND_COLORS = {
    pipeline: '#2F80ED', self_improve: '#F2994A', lifecycle: '#EB5757',
  };

  function modifiedTypeNames() {
    const names = new Set();
    (window._schemaOperationLinks || []).forEach(function(l) {
      if (l.effect === 'modifies') names.add(String(l.target).replace(/^type:/, ''));
    });
    return names;
  }

  // Anchor two rects on their facing sides (left→right flow).
  function anchorBetween(s, t) {
    const sCx = s.x + s.w / 2, tCx = t.x + t.w / 2;
    if (tCx >= sCx) {
      return { sx: s.x + s.w, sy: s.y + s.h / 2, tx: t.x, ty: t.y + t.h / 2 };
    }
    return { sx: s.x, sy: s.y + s.h / 2, tx: t.x + t.w, ty: t.y + t.h / 2 };
  }

  // Horizontal-ease cubic; for multi-column spans it drops the curve below the
  // cards so it arcs under the intermediate cards instead of cutting through them.
  function flowCurve(sx, sy, tx, ty, offset) {
    offset = offset || 0;
    const dx = tx - sx;
    const dy = Math.abs(ty - sy);
    const span = Math.abs(dx) / (LAYOUT.BOX_W + LAYOUT.COL_GAP);
    const handle = Math.max(60, Math.abs(dx) * 0.5);
    const dir = dx >= 0 ? 1 : -1;
    let c1y = sy + offset, c2y = ty + offset;
    // Drop the control points below the card band so multi-column edges arc
    // clearly under the intermediate cards rather than grazing them. Only
    // when the endpoints sit at similar heights: with a large vertical span
    // (tall columns) the drop overshot below BOTH cards, hooking the curve
    // back up so the arrowhead pointed the wrong way ("inverted" arrows).
    // Vertically distant cards get the plain horizontal-ease instead, which
    // already clears the band diagonally.
    if (span >= 1.25 && dy < 140) {
      const drop = Math.max(sy, ty) + (64 + span * 40);
      c1y = drop + offset;
      c2y = drop + offset;
    } else if (span >= 0.4 && dy < 90) {
      // Adjacent columns: a gentle downward bow so the edge clears the card edges.
      const drop = Math.max(sy, ty) + 34;
      c1y = drop + offset;
      c2y = drop + offset;
    }
    const c1x = sx + dir * handle, c2x = tx - dir * handle;
    // Straight run-in/run-out segments: the arrow marker orients to the path
    // tangent at the endpoint, so it must sit on a visibly straight piece of
    // line or the head appears detached/rotated off the curve.
    const RUN = 10;
    const sx2 = sx + dir * RUN, tx2 = tx - dir * RUN;
    return {
      d: 'M ' + sx + ' ' + sy +
         ' L ' + sx2 + ' ' + sy +
         ' C ' + c1x + ' ' + c1y + ', ' + c2x + ' ' + c2y + ', ' + tx2 + ' ' + ty +
         ' L ' + tx + ' ' + ty,
      mx: (c1x + c2x) / 2,
      my: (c1y + c2y) / 2,
    };
  }

  function updateSchemaStatus(focusId) {
    const selEl = document.getElementById('schema-selection');
    if (!selEl) return;
    selEl.textContent = '';
    if (focusId) {
      const name = ((window._schemaInstanceIndex || {})[focusId] || {}).name || focusId;
      const label = document.createElement('span');
      label.textContent = 'Focused on ' + name + '   ';
      label.style.cssText = 'color:#1A1F36;font-weight:600;';
      const clear = document.createElement('span');
      clear.textContent = 'Clear focus';
      clear.style.cssText = 'color:#1F9E6E;cursor:pointer;font-weight:600;';
      clear.addEventListener('click', window._clearSchemaLens);
      selEl.appendChild(label);
      selEl.appendChild(clear);
    } else {
      selEl.style.color = '#8792A2';
      selEl.textContent = 'Click any instance card to trace its connections.';
    }
  }

  function clearSpotlight() {
    const svg = d3.select('#schema-svg');
    svg.select('g.sd-spotlight').remove();
    svg.selectAll('.sd-node-box, .sd-mini-card')
      .classed('is-dim', false).classed('is-spotlit', false).classed('is-linked', false);
    svg.selectAll('.sd-edge-path, .sd-edge-label-bg, .sd-edge-label').classed('is-dim', false);
    svg.selectAll('.sd-op-chip').classed('is-dim', false).classed('is-spotlit', false);
  }

  // Spotlight a transformation operation: highlight the types it affects and
  // draw color-coded impact edges (produces/enriches/modifies/removes).
  function applyOpSpotlight(opId) {
    const svg = d3.select('#schema-svg');
    clearSpotlight();
    const links = (window._schemaOperationLinks || []).filter(function(l) { return l.source === opId; });
    if (!links.length) { updateSchemaStatus(null); return; }
    const targetNames = new Set(links.map(function(l) { return String(l.target).replace(/^type:/, ''); }));

    svg.selectAll('.sd-node-box').classed('is-dim', function() { return !targetNames.has(this.dataset.nodeType); });
    svg.selectAll('.sd-mini-card').classed('is-dim', true);
    svg.selectAll('.sd-edge-path, .sd-edge-label-bg, .sd-edge-label').classed('is-dim', true);
    svg.selectAll('.sd-op-chip').classed('is-dim', function() { return this.dataset.op !== opId; })
      .classed('is-spotlit', function() { return this.dataset.op === opId; });

    const opRect = (window._opRects || {})[opId];
    const boxRects = window._boxRectByType || {};
    const fitRects = [];
    if (opRect) {
      fitRects.push(opRect);
      const overlay = (schemaRootSel || svg).append('g').attr('class', 'sd-spotlight');
      links.forEach(function(l) {
        const tname = String(l.target).replace(/^type:/, '');
        const r = boxRects[tname];
        if (!r) return;
        fitRects.push(r);
        const color = EFFECT_COLORS[l.effect] || '#8792A2';
        // Vertical-ease cubic: operation chip (top) feeds down into the type card.
        const sx = opRect.x + opRect.w / 2, sy = opRect.y + opRect.h;
        const tx = r.x + r.w / 2, ty = r.y;
        const midy = (sy + ty) / 2;
        const d = 'M ' + sx + ' ' + sy + ' C ' + sx + ' ' + midy + ', ' + tx + ' ' + midy + ', ' + tx + ' ' + ty;
        overlay.append('path').attr('class', 'sd-spotlight-edge-halo').attr('fill', 'none').attr('stroke', color).attr('d', d);
        const path = overlay.append('path').attr('class', 'sd-op-edge').attr('fill', 'none').attr('stroke', color).attr('d', d);
        if (EFFECT_DASH[l.effect]) path.attr('stroke-dasharray', EFFECT_DASH[l.effect]);
      });
    }
    // Frame the operation + its targets in view.
    if (fitRects.length) {
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
      fitRects.forEach(function(r) {
        x0 = Math.min(x0, r.x); y0 = Math.min(y0, r.y);
        x1 = Math.max(x1, r.x + r.w); y1 = Math.max(y1, r.y + r.h);
      });
      fitSchema({ x: x0 - 40, y: y0 - 40, width: (x1 - x0) + 80, height: (y1 - y0) + 80 }, true);
    }
    const op = (window._schemaOperations || []).find(function(o) { return o.id === opId; });
    updateOpStatus(op);
  }

  function updateOpStatus(op) {
    const selEl = document.getElementById('schema-selection');
    if (!selEl) return;
    selEl.textContent = '';
    if (!op) { updateSchemaStatus(null); return; }
    const label = document.createElement('span');
    label.textContent = (op.summary || op.name) + '   ';
    label.style.cssText = 'color:#1A1F36;font-weight:600;';
    const clear = document.createElement('span');
    clear.textContent = 'Clear';
    clear.style.cssText = 'color:#1F9E6E;cursor:pointer;font-weight:600;';
    clear.addEventListener('click', window._clearSchemaLens);
    selEl.appendChild(label);
    selEl.appendChild(clear);
  }

  function applySpotlight(focusId) {
    const index = window._schemaInstanceIndex || {};
    const focus = index[focusId];
    const svg = d3.select('#schema-svg');
    clearSpotlight();
    if (!focus) { updateSchemaStatus(null); return; }

    const links = [];
    (focus.out || []).forEach(function(e) { links.push({ id: e.id, relation: e.relation, dir: 'out' }); });
    (focus.in || []).forEach(function(e) { links.push({ id: e.id, relation: e.relation, dir: 'in' }); });
    const linkedIds = {}; linkedIds[focusId] = true;
    links.forEach(function(l) { linkedIds[l.id] = true; });
    const activeTypes = {};
    Object.keys(linkedIds).forEach(function(id) { const n = index[id]; if (n) activeTypes[n.type] = true; });

    svg.selectAll('.sd-mini-card')
      .classed('is-dim', function() { return !linkedIds[this.dataset.iid]; })
      .classed('is-spotlit', function() { return this.dataset.iid === focusId; })
      .classed('is-linked', function() { return this.dataset.iid !== focusId && !!linkedIds[this.dataset.iid]; });
    svg.selectAll('.sd-node-box').classed('is-dim', function() { return !activeTypes[this.dataset.nodeType]; });
    svg.selectAll('.sd-edge-path, .sd-edge-label-bg, .sd-edge-label').classed('is-dim', true);

    const rects = window._miniCardRects || {};
    const boxRects = window._boxRectByType || {};
    const focusRect = rects[focusId] || boxRects[focus.type];
    if (focusRect) {
      // Append inside the zoomable root so the overlay pans/zooms with the cards.
      const overlay = (schemaRootSel || svg).append('g').attr('class', 'sd-spotlight');
      const accent = accentFor(focus.type);
      const marker = overlay.append('defs').append('marker')
        .attr('id', 'sd-spot-arrow').attr('viewBox', '0 -5 10 10')
        .attr('refX', 10).attr('refY', 0).attr('markerWidth', 7).attr('markerHeight', 7)
        .attr('orient', 'auto');
      marker.append('path').attr('d', 'M0,-4L10,0L0,4').attr('fill', accent);
      let sameCardIdx = 0;
      let crossCardIdx = 0;
      // Greedy vertical declutter: connector labels for links to nearby
      // instances land on nearly the same midpoint and overprint into
      // garbage. Push each new label below any already-placed neighbor.
      const placedLabelYs = [];
      function declutterY(y) {
        let moved = true;
        while (moved) {
          moved = false;
          for (let i = 0; i < placedLabelYs.length; i++) {
            if (Math.abs(y - placedLabelYs[i]) < 13) { y = placedLabelYs[i] + 13; moved = true; }
          }
        }
        placedLabelYs.push(y);
        return y;
      }
      links.forEach(function(l) {
        const n = index[l.id];
        if (!n) return;
        const tgtRect = rects[l.id] || boxRects[n.type];
        if (!tgtRect) return;
        let s = focusRect, t = tgtRect;
        if (l.dir === 'in') { s = tgtRect; t = focusRect; }
        let d, lx, ly, anchor = 'middle';
        if (n.type === focus.type) {
          // Connection between two instances of the SAME type card. The
          // facing-side anchors degenerate here: the connector cut straight
          // across the card with its label overprinting the others. Route a
          // side loop out of the card's LEFT edge instead (the right side
          // already hosts the type-pair loops), nesting loops and labels by
          // index so multiple relations stay individually readable.
          sameCardIdx += 1;
          const sx = s.x, sy = s.y + s.h / 2;
          const tx = t.x, ty = t.y + t.h / 2;
          const bulge = 46 + Math.min(140, Math.abs(ty - sy) * 0.18) + sameCardIdx * 16;
          const RUN = 8;
          d = 'M ' + sx + ' ' + sy +
              ' L ' + (sx - RUN) + ' ' + sy +
              ' C ' + (sx - bulge) + ' ' + sy +
              ', ' + (tx - bulge) + ' ' + ty +
              ', ' + (tx - RUN) + ' ' + ty +
              ' L ' + tx + ' ' + ty;
          // Right-align the label just left of the loop apex so the text
          // extends away from the nested loop strokes.
          lx = Math.min(sx, tx) - bulge - 4;
          ly = declutterY((sy + ty) / 2);
          anchor = 'end';
        } else {
          // Cross-card connector: spread vertically so labels between the
          // same pair of cards don't land on one coincident midpoint.
          crossCardIdx += 1;
          const spread = ((crossCardIdx % 5) - 2) * 16;
          const a = anchorBetween(s, t);
          const curve = flowCurve(a.sx, a.sy, a.tx, a.ty, spread);
          d = curve.d;
          lx = curve.mx;
          ly = declutterY(curve.my);
        }
        overlay.append('path').attr('class', 'sd-spotlight-edge-halo').attr('fill', 'none').attr('stroke', accent).attr('d', d);
        overlay.append('path').attr('class', 'sd-spotlight-edge').attr('fill', 'none').attr('stroke', accent)
          .attr('marker-end', 'url(#sd-spot-arrow)').attr('d', d);
        overlay.append('text').attr('class', 'sd-spotlight-label')
          .attr('x', lx).attr('y', ly).attr('text-anchor', anchor)
          .attr('fill', accent).text(l.relation);
      });
    }

    // Frame the spotlighted connections in the visible area (left of the panel)
    // so they aren't hidden behind it.
    const fitRects = [];
    if (focusRect) fitRects.push(focusRect);
    links.forEach(function(l) {
      const n = index[l.id];
      const r = rects[l.id] || (n && boxRects[n.type]);
      if (r) fitRects.push(r);
    });
    if (fitRects.length) {
      let x0 = Infinity, y0 = Infinity, x1 = -Infinity, y1 = -Infinity;
      fitRects.forEach(function(r) {
        x0 = Math.min(x0, r.x); y0 = Math.min(y0, r.y);
        x1 = Math.max(x1, r.x + r.w); y1 = Math.max(y1, r.y + r.h);
      });
      // Extra bottom padding for connector edges that arc below the cards.
      fitSchema({ x: x0 - 40, y: y0 - 30, width: (x1 - x0) + 80, height: (y1 - y0) + 210 }, true);
    }
    updateSchemaStatus(focusId);
  }

  window._focusSchemaInstance = function(instanceId) {
    if (!(window._schemaInstanceIndex || {})[instanceId]) return;
    window._schemaSpotlight = instanceId;
    applySpotlight(instanceId);
  };
  window._clearSchemaLens = function() {
    window._schemaSpotlight = null;
    clearSpotlight();
    updateSchemaStatus(null);
    fitSchema(null, true);  // zoom back out to the whole diagram
  };

  window._renderSchemaGraph = function(preserveView) {
    // Preserve the current pan/zoom when re-rendering in place (expand/collapse).
    let saved = null;
    if (preserveView && schemaSvgSel) {
      try { saved = d3.zoomTransform(schemaSvgSel.node()); } catch (e) { saved = null; }
    }
    const model = buildSchemaModel();
    if (!model.nodeTypes.length) {
      setSchemaEmpty('No schema configured for this dataset.');
      updateSchemaStatus(null);
      return;
    }
    hideSchemaEmpty();
    renderSchemaDiagram(model, saved);
    // Re-apply an active spotlight after a fresh render (e.g. theme toggle).
    if (window._schemaSpotlight && (window._schemaInstanceIndex || {})[window._schemaSpotlight]) {
      applySpotlight(window._schemaSpotlight);
    } else {
      window._schemaSpotlight = null;
      updateSchemaStatus(null);
    }
  };

  // Zoom control buttons (wired once; act on the active zoom behavior).
  (function () {
    function bind(id, fn) {
      const el = document.getElementById(id);
      if (el) el.addEventListener('click', fn);
    }
    bind('schema-zoom-in', function () {
      if (schemaSvgSel && schemaZoomBehavior) schemaSvgSel.transition().duration(180).call(schemaZoomBehavior.scaleBy, 1.4);
    });

      if (schemaSvgSel && schemaZoomBehavior) schemaSvgSel.transition().duration(180).call(schemaZoomBehavior.scaleBy, 1 / 1.4);
    });

    bind('schema-ops-toggle', function () {

      const legend = document.getElementById('schema-legend');
      if (btn) btn.classList.toggle('active', window._schemaShowOps);
      if (legend) legend.style.display = window._schemaShowOps ? 'block' : 'none';
      window._schemaSpotlight = null;
      window._renderSchemaGraph();  // re-render + reframe to include/exclude the rail
    });
  })();

  if (!schemaData && (!schemaGraphData || !schemaGraphData.nodes || !schemaGraphData.nodes.length)) {
    setSchemaEmpty('No schema configured for this dataset.');
  }
})();

var nodes = [{"name": "This document describes BlackoutOps, an incident management project using Cognee Cloud to reconstruct incident context. ", "type": "TextSummary", "ontology_valid": false, "version": 1, "topological_rank": 3, "metadata": {"index_fields": ["text"]}, "belongs_to_set": null, "source_pipeline": "cognify_pipeline", "source_task": "extract_graph_and_summarize", "source_node_set": null, "source_user": "default_user@example.com", "source_content_hash": "2e23c35b76db64af6cd10d090817d9b9", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "This document describes BlackoutOps, an incident management project using Cognee Cloud to reconstruct incident context.\n- BlackoutOps helps on-call engineers recall details of past incidents.\n- It was built for the WeMakeDevs \u00d7 Cognee hackathon in July 2026, running fully on Cognee Cloud.\n- The project ingests raw artifacts (like alerts, shell history) into a Cognee knowledge graph.\n- This graph connects services, commands, and people, facilitating debriefs and cross-incident memory.\n- BlackoutOps enhances future responses by enriching postmortem patterns and supports data deletion for retention.\n- Key components include `memory.py` for Cognee API calls and `app.py` (FastAPI) for the application.\n- A `dns_fallback.py` script addresses DNS resolution for new Cognee tenant subdomains.\n- Quickstart involves cloning the repo, installing, and configuring Cognee credentials from platform.cognee.ai using `COGNEE-35`.", "source_chunk_id": "7e8a6655-ea43-50e5-badf-fd7c53c4f356", "summarized_in": null, "global_context_bucket_id": null, "id": "15d2049e-60c8-5e3e-86b6-46620010cd8e", "color": "#FFB454", "is_memory_learning": false, "is_unnamed": false, "t_created": 1783264977222, "stage": "summary", "visual_rank": 3, "degree": 1, "importance": 0.1905514124267734, "label_priority": false, "provenance": {"source_task": "extract_graph_and_summarize", "source_pipeline": "cognify_pipeline", "source_user": "default_user@example.com"}}, {"name": "Documentation file README.md of repository 'blackoutops': # \ud83c\udf05 BlackoutOps \u2014 the morning-after incident brain > **You got", "type": "DocumentChunk", "ontology_valid": false, "version": 1, "topological_rank": 2, "metadata": {"index_fields": ["text"]}, "belongs_to_set": null, "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_node_set": null, "source_user": "default_user@example.com", "source_content_hash": "2e23c35b76db64af6cd10d090817d9b9", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "Documentation file README.md of repository 'blackoutops':\n# \ud83c\udf05 BlackoutOps \u2014 the morning-after incident brain\n\n> **You got paged at 3AM. You fixed it half-asleep. BlackoutOps remembers what you can't.**\n>\n> Built for **\"The Hangover Part AI: Where's My Context?\"** \u2014 WeMakeDevs \u00d7 Cognee hackathon, July 2026.\n> Runs end-to-end on **Cognee Cloud**. The app keeps **no database of its own** \u2014 Cognee *is* the memory.\n\n![BlackoutOps war room](docs/screenshot-warroom.png)\n\n## The problem\n\nEvery on-call engineer knows the hangover: alerts at 02:47, pages at 03:15, a blur of `kubectl` commands, a rollback at 03:41, sleep at 04:02. The next morning the dashboard is green and the *context is gone* \u2014 what broke, what you ran, why it worked, and whether the team has seen this exact failure before. That knowledge normally dies in scrollback. Six months of incidents later, the org keeps re-diagnosing the same eviction storm from scratch.\n\n**BlackoutOps is The Hangover, played straight for DevOps:** it reconstructs the night you can't remember, answers questions about it, learns the confirmed root-cause pattern, and honors retention policy by provably forgetting.\n\nMost incident tooling helps you fight the *next* fire. BlackoutOps rebuilds the *last* one you can't remember \u2014 forensic reconstruction of a lived-through outage is the literal answer to \"Where's My Context?\", and it's what the whole design is bent toward.\n\n## What it does\n\n1. **Ingests the night's raw artifacts** \u2014 Prometheus alerts, PagerDuty pages, the Slack `#incidents` scroll, your actual shell history, deploy logs \u2014 into a Cognee knowledge graph that connects *services \u2192 deploys \u2192 commands \u2192 causes \u2192 people*.\n2. **Morning-after debrief chat** \u2014 \"What happened last night?\", \"What exactly did I run at 3AM?\" \u2014 every answer is a live, auto-routed `recall()` over graph + session memory.\n3. **Cross-incident memory** \u2014 \"Have we seen this before?\" traverses a *separate* incident from three weeks earlier and connects both through shared entities (`redis-cache`, TTL-less keys, eviction storm). This is the question a plain vector store fumbles and a knowledge graph nails.\n4. **Files the postmortem back into memory** and runs `improve()` \u2014 the confirmed pattern is enriched so the *next* 3AM page gets answered in seconds.\n5. **Forgets on command** \u2014 retention policy as a first-class feature: `forget(dataset=\u2026)` surgically deletes an incident, and you can watch recall honestly not know it anymore.\n\n## How we use Cognee (the whole lifecycle, not just RAG)\n\n| Lifecycle | Where | What it does here |\n|---|---|---|\n| **`remember()`** | [`memory.py \u2192 ingest_artifacts()`](memory.py) | Each raw ops artifact becomes permanent graph memory in a per-incident dataset (`incident_2026_07_05`, `incident_2026_06_14`) |\n| **`remember(QAEntry, session_id=\u2026)`** | [`memory.py \u2192 store_qa()`](memory.py) | Every debrief Q&A is stored as a **typed QAEntry** in session memory (`morning-after-debrief`) \u2014 refresh the page: the *UI* forgets, Cognee doesn't |\n| **`remember(FeedbackEntry, \u2026)`** | [`memory.py \u2192 add_feedback()`](memory.py) | \ud83d\udc4d/\ud83d\udc4e on any answer stores a typed FeedbackEntry attached to that QA memory \u2014 human signal living next to the answer it judges |\n| **`recall()`** | [`memory.py \u2192 ask()`](memory.py) | Auto-routed recall over **both** incident datasets + session memory (`auto_route=True`), returning graph-completion answers with provenance |\n| **`improve()`** | [`memory.py \u2192 file_postmortem()`](memory.py) | The confirmed postmortem goes through the full cloud remember pipeline, then the dedicated `improve()` pass is attempted \u2014 with the honest receipt shown in the UI on tenants that don't expose that route yet |\n| **`forget()`** | [`memory.py \u2192 purge()`](memory.py) | Dataset-scoped deletion (`memory_only=True`) with Cognee's own receipt shown in the UI \u2014 see \"Bugs we found upstream\" for why memory-only |\n| **Graph visualization** | [`memory.py \u2192 graph_html()`](memory.py) | The tenant's `/api/v1/visualize` rendered in-app, so you can *see* what the brain built out of the night |\n\n## Architecture\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510        \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  war-room UI (static/)      \u2502        \u2502  Cognee Cloud (tenant)           \u2502\n\u2502  chat \u00b7 lifecycle \u00b7 graph   \u2502  HTTP  \u2502                                  \u2502\n\u2502            \u2502                \u2502 \u2500\u2500\u2500\u2500\u2500\u25ba \u2502  remember \u2500\u25ba knowledge graph     \u2502\n\u2502  FastAPI (app.py)           \u2502        \u2502  recall   \u2500\u25ba graph + session     \u2502\n\u2502  memory layer (memory.py)   \u2502 \u25c4\u2500\u2500\u2500\u2500\u2500 \u2502  improve  \u2500\u25ba pattern enrichment  \u2502\n\u2502  \u00b7 cognee.serve(url, key)   \u2502        \u2502  forget   \u2500\u25ba surgical deletion   \u2502\n\u2502  \u00b7 zero local storage       \u2502        \u2502  visualize\u2500\u25ba force graph HTML    \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518        \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n- **`memory.py`** \u2014 the honest core: five functions, each mapping 1:1 to a lifecycle call. No local store, no cache, no cheating.\n- **`app.py`** \u2014 thin FastAPI: seed / ask / postmortem / forget / graph endpoints + static UI.\n- **`dns_fallback.py`** \u2014 real-world ops touch: freshly provisioned tenant subdomains can sit in public resolvers' negative DNS cache (ours did, on 1.1.1.1). If the system resolver fails, we resolve over DNS-over-HTTPS and pin via a `socket.getaddrinfo` patch. Diagnosed and worked around *during* the hackathon \u2014 very much in the spirit of the theme.\n\n## Quickstart\n\n```bash\ngit clone https://github.com/devanshug2307/blackoutops && cd blackoutops\npython3.12 -m venv .venv && .venv/bin/pip install -r requirements.txt\n\ncp .env.example .env   # then fill in your tenant URL + API key\n\n.venv/bin/uvicorn app:app --port 8787 --loop asyncio\n# open http://127.0.0.1:8787\n# (--loop asyncio lets the DoH DNS fallback work for brand-new tenants;\n#  uvloop bypasses socket.getaddrinfo, plain asyncio doesn't)\n```\n\nGet a tenant + key at [platform.cognee.ai](https://platform.cognee.ai) (hackathon credit code `COGNEE-35`).\n\n## Demo script (3 minutes)\n\n1. **Seed the night** \u2192 watch `remember()` build two incident datasets on the cloud.\n2. Ask **\"What happen", "chunk_size": 2636, "chunk_index": 0, "cut_type": "sentence_cut", "document_id": "392e46c6-117a-5cb1 mory answers when datasets were forgotten or empty.\n- On 2026-07-05, Devanshu Goyal implemented `memory_only forget` to fully tombstone dataset names upstream in blackoutops.\n- On 2026-07-05, Devanshu Goyal decoupled the feed from seed state and added date-anchored question chips in blackoutops.\n- On 2026-07-05, Devanshu Goyal updated the `README.md` of blackoutops with an upstream bugs section and screenshots.\n- On 2026-07-05, Devanshu Goyal initiated 'BlackoutOps: morning-after incident brain on Cognee Cloud' involving a remember/recall/improve/forget lifecycle over per-incident datasets.\n- On 2026-07-05, Devanshu Goyal developed a war-room UI and DNS-over-HTTPS fallback for fresh tenant subdomains as part of BlackoutOps.\n- Claude Fable 5 co-authored multiple commits with Devanshu Goyal on 2026-07-05 for the blackoutops project.", "source_chunk_id": "9183cfd8-fb97-536c-bbaf-a60e545ad241", "summarized_in": null, "global_context_bucket_id": null, "id": "7e0a801b-de7d-5517-baf6-9c98d9145274", "color": "#FFB454", "is_memory_learning": false, "is_unnamed": false, "t_created": 1783264989391, "stage": "summary", "visual_rank": 3, "degree": 1, "importance": 0.1905514124267734, "label_priority": false, "provenance": {"source_task": "extract_graph_and_summarize", "source_pipeline": "cognify_pipeline", "source_user": "default_user@example.com"}}, {"name": "Git history of repository 'blackoutops', chapter 1 (most recent first): - commit 6a3eeb3 on 2026-07-05 by Devanshu Goyal", "type": "DocumentChunk", "ontology_valid": false, "version": 1, "topological_rank": 2, "metadata": {"index_fields": ["text"]}, "belongs_to_set": null, "source_pipeline": "cognify_pipeline", "source_task": "extract_chunks_from_documents", "source_node_set": null, "source_user": "default_user@example.com", "source_content_hash": "2ba0f639ce544b543eb5c2141eb77122", "feedback_weight": 0.5, "importance_weight": 0.5, "text": "Git history of repository 'blackoutops', chapter 1 (most recent first):\n- co function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function truncate(s,n){if(!s)return"";return s.length>n?s.slice(0,n)+"\u2026":s}
function hexToRgb(hex){
  if(!hex)return[219,216,216];
  var c=hex.replace("#","");
  if(c.length===3)c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  var n=parseInt(c,16);
  return[(n>>16)&255,(n>>8)&255,n&255];
}
function hslToRgb(h,s,l){
  s/=100;l/=100;
  var a=s*Math.min(l,1-l);

  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}
function clamp(v,lo,hi){return v<lo?lo:v>hi?hi:v}
function lerp(a,b,t){return a+(b-a)*t}

var N=nodes.length;

// Share node/link details with the Memory view (views/memory_map.js) so its

function boolValue(v){

  for(var i=0;i<text.length;i++){hash=((hash<<5)-hash+text.charCodeAt(i))|0}

});

function inferLayoutCategory(n){
  if(hasMeaningfulTopologicalRank){
    var rank=numberValue(n.topological_rank);
    return "Rank "+(rank===null?0:rank);
  }
  if(n.type==="TextDocument")return "Document";
  if(n.type==="DocumentChunk")return "Chunk";
  if(n.type==="TextSummary")return "Summary";
  if(n.type==="GlobalContextSummary"){
    if(boolValue(n.is_root))return "Context Root";
    var level=numberValue(n.level);
    return "Context L"+(level===null?0:level);
  }
  if(n.type==="Entity")return "Entity";
  if(n.type==="EntityType")return "Type";
  if(n.type==="DatabaseSchema")return "Database";
  if(n.type==="SchemaTable"||n.type==="TableType")return "Table";
  if(n.type==="SchemaRelationship")return "Schema Rel";
  if(n.type==="TableRow")return "Row";
  if(n.type==="ColumnValue")return "Column";
  return n.type||"Node";
}

function inferLayoutRank(n){
  if(hasMeaningfulTopologicalRank){
    var rank=numberValue(n.topological_rank);
    if(rank!==null)return rank;
  }
  if(n.type==="TextDocument")return 0;
  if(n.type==="DocumentChunk")return 1;
  if(n.type==="TextSummary")return 2;
  if(n.type==="GlobalContextSummary"){
    if(boolValue(n.is_root))return 4+maxGlobalContextLevel;
    var level=numberValue(n.level);
    return 3+(level===null?0:level);
  }
  if(n.type==="Entity")return 3;
  if(n.type==="EntityType")return 4;
  if(n.type==="DatabaseSchema")return 0;
  if(n.type==="SchemaTable"||n.type==="TableType")return 1;
  if(n.type==="SchemaRelationship")return 2;
  if(n.type==="TableRow")return 2;
  if(n.type==="ColumnValue")return 3;
  if(n.source_task&&String(n.source_task).indexOf("extract_chunks")>=0)return 1;
  if(n.source_task&&String(n.source_task).indexOf("summar")>=0)return 2;
  if(n.source_task&&String(n.source_task).indexOf("graph")>=0)return 3;
  return 3;
}

  });
  if(entries.length===0)return "Nodes";
  if(entries.length>1&&rankStats[entries[1]]/rankStats[entries[0]]>=0.25){
    return entries[0]+" / "+entries[1];
  }
  return entries[0];
}

// ── Pipeline (Story) layout — bins nodes by preprocessor.stage ──
// Each stage becomes one vertical column laid left-to-right in the
// canonical order set by preprocessor.STAGE_ORDER. Within each column
// nodes are sorted by (visual_rank, importance desc). Falls back to
// computeRankedLayout() for graphs without preprocessor stage info.
var STORY_STAGE_ORDER=["document","chunk","entity","type","summary","context","schema","other"];
var STORY_STAGE_LABEL={
  document:"Documents",
  chunk:"Chunks",
  entity:"Entities",
  type:"Types",
  summary:"Summaries",
  context:"Context",
  schema:"Schema",
  other:"Other",
};
function computePipelineLayout(){
  var stageCounts={};
  nodes.forEach(function(n){
    var s=n.stage||"other";
    stageCounts[s]=(stageCounts[s]||0)+1;
  });
  var presentStages=STORY_STAGE_ORDER.filter(function(s){return stageCounts[s]>0});
  if(presentStages.length<2){
    computeRankedLayout();
    return;
  }
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=presentStages.map(function(stage,index){
    return {
      rank: index,
      index: index,
      x: (index-(presentStages.length-1)/2)*rankColumnGap,
      label: STORY_STAGE_LABEL[stage]+" ("+stageCounts[stage]+")",
      stage: stage,
    };
  });
  var stageIndexMap={};
  presentStages.forEach(function(stage,index){stageIndexMap[stage]=index});

  var byStage={};
  presentStages.forEach(function(s){byStage[s]=[]});
  nodes.forEach(function(n){
    var s=n.stage||"other";
    if(!byStage[s])byStage[s]=[];
    byStage[s].push(n);
  });
  presentStages.forEach(function(stage){
    byStage[stage].sort(function(a,b){
      var ra=numberValue(a.visual_rank)||0;
      var rb=numberValue(b.visual_rank)||0;
      if(ra!==rb)return ra-rb;
      return (b.importance||0)-(a.importance||0);
    });
  });

  // Dense stages (e.g. 200+ entities on the Alice book) get packed into
  // multiple sub-columns within their stage's allotted horizontal slot,
  // so the vertical span stays readable and auto-fit doesn't crush
  // everything to 0.05x zoom. Sub-column gap is kept tight (≤ 28px) so
  // each stage still reads as ONE cluster, not as multiple stages.
  //
  // Lane spacing has to clear the LARGEST possible importance-scaled
  // node diameter so high-importance nodes (impFactor up to 1.5 → radius
  // up to ~21px → diameter ~42px) don't overlap their neighbors. We add
  // a 12px breathing margin on top of that floor.
  var laneSpacing=N>1000?32:N>300?40:N>120?52:64;
  var MAX_ROWS_PER_SUBCOL=36;
  presentStages.forEach(function(stage){
    var colIdx=stageIndexMap[stage];
    var column=rankColumns[colIdx];
    var colNodes=byStage[stage];
    var n=colNodes.length;
    var subCols=Math.max(1,Math.ceil(n/MAX_ROWS_PER_SUBCOL));
    var rowsPerSub=Math.ceil(n/subCols);
    // Sub-column gap deliberately tight (max 28px) so the cluster reads
    // as a single stage, not as multiple stages. Constrain total cluster
    // width to ~55% of the stage slot — leaves clear gutters either side.
    var maxClusterW=rankColumnGap*0.55;
    var subGap=subCols>1?Math.min(28,maxClusterW/(subCols-1)):0;
    var totalHeight=(rowsPerSub-1)*laneSpacing;
    var startY=-totalHeight/2;
    var startSubX=column.x-(subCols-1)*subGap/2;
    colNodes.forEach(function(node,i){
      var sub=Math.floor(i/rowsPerSub);
      var row=i%rowsPerSub;
      node._layoutRank=colIdx;
      node._layoutCategory=STORY_STAGE_LABEL[stage];
      node._targetX=startSubX+sub*subGap;
      node._targetY=startY+row*laneSpacing;
      if(typeof node.x!=="number"||!isFinite(node.x)){
        var jitter=(stableHash(node.id)%100)/100-0.5;
        node.x=node._targetX+jitter*Math.max(subGap,12)*0.3;
        node.y=node._targetY+jitter*laneSpacing;
      }
      // Pin BOTH x and y in Story mode — the layout is meant to be a
      // clean deterministic grid (one row per node within each stage
      // column). Letting y float lets link forces pull connected nodes
      // toward each other, which collapsed nodes onto neighbors. Fully
      // pinned + sufficient laneSpacing = no overlap. Cleared by
      // applyLayoutMode on switch to Flow / Force / Organic layouts.
      node.fx=node._targetX;
      node.fy=node._targetY;
    });
  });
}

function computeRankedLayout(){
  var rankStats={};
  nodes.forEach(function(n){
    var rank=inferLayoutRank(n);
    var category=inferLayoutCategory(n);
    n._layoutRank=rank;
    n._layoutCategory=category;
    if(!rankStats[rank])rankStats[rank]={};
    rankStats[rank][category]=(rankStats[rank][category]||0)+1;
  });

  var ranks=Object.keys(rankStats).map(Number).sort(function(a,b){return a-b});
  var gapBase=N>2000?190:N>500?220:270;
  rankColumnGap=gapBase;
  rankColumns=ranks.map(function(rank,index){
    return {
      rank: rank,
      index: index,
      x: (index-(ranks.length-1)/2)*rankColumnGap,
      label: labelForRank(rankStats[rank]),
    };
  });

  var rankIndexByValue={};
  rankColumns.forEach(function(column,index){rankIndexByValue[column.rank]=index});
  var laneSpacing=N>1000?34:N>300?44:58;
  nodes.forEach(function(n){
    var column=rankColumns[rankIndexByValue[n._layoutRank]];
    var hash=stableHash(layoutLaneKey(n));
    var laneCount=N>1500?17:N>500?13:9;
    var lane=hash%laneCount-Math.floor(laneCount/2);
    var jitter=(stableHash(n.id)%100)/100-0.5;
    n._targetX=column?column.x:0;
    n._targetY=lane*laneSpacing+jitter*laneSpacing*0.35;
    if(typeof n.x!=="number"||!isFinite(n.x)){
      n.x=n._targetX+jitter*rankColumnGap*0.25;
      n.y=n._targetY+jitter*laneSpacing;
    }
  });
}

function computeOrganicLayout(){
  var counts={};
  nodes.forEach(function(n){
    var type=n.type||"Node";
    counts[type]=(counts[type]||0)+1;
  });

  var types=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]||a.localeCompare(b)});
  var radius=clamp(Math.sqrt(N)*20,180,520);
  organicClusters=types.map(function(type,index){
    var angle=types.length===1?0:-Math.PI/2+index*Math.PI*2/types.length;
    var clusterRadius=clamp(64+Math.sqrt(counts[type])*9,96,240);
    return {
      type:type,
      count:counts[type],
      x:types.length===1?0:Math.cos(angle)*radius,
      y:types.length===1?0:Math.sin(angle)*radius,
      radius:clusterRadius,
    };
  });

  var clusterByType={};
  organicClusters.forEach(function(cluster){clusterByType[cluster.type]=cluster});
  nodes.forEach(function(n){
    var cluster=clusterByType[n.type||"Node"]||{x:0,y:0,radius:120};
    var angleHash=stableHash((n.id||n.name||"")+":angle")%6283/1000;
    var distHash=(stableHash((n.id||n.name||"")+":distance")%1000)/1000;
    var localRadius=Math.sqrt(distHash)*cluster.radius*0.62;
    n._organicX=cluster.x+Math.cos(angleHash)*localRadius;
    n._organicY=cluster.y+Math.sin(angleHash)*localRadius;
  });
}

// ── Transform state ──
var tx=W/2,ty=H/2,scale=1;

// ── Smooth zoom animation state ──
var zoomAnim=null; // {fromScale,toScale,fromTx,toTx,fromTy,toTy,startTime,duration}

function animateZoom(){
  if(!zoomAnim)return;
  var elapsed=performance.now()-zoomAnim.startTime;
  var t=Math.min(1,elapsed/zoomAnim.duration);
  // Ease out cubic
  var e=1-Math.pow(1-t,3);
  scale=lerp(zoomAnim.fromScale,zoomAnim.toScale,e);
  tx=lerp(zoomAnim.fromTx,zoomAnim.toTx,e);
  ty=lerp(zoomAnim.fromTy,zoomAnim.toTy,e);
  draw();
  if(t<1){requestAnimationFrame(animateZoom)}
  else{zoomAnim=null}
}

function smoothZoomTo(newScale,pivotX,pivotY,duration){
  newScale=clamp(newScale,0.02,30);
  var ratio=newScale/scale;
  var newTx=pivotX-(pivotX-tx)*ratio;
  var newTy=pivotY-(pivotY-ty)*ratio;
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||150};
  requestAnimationFrame(animateZoom);
}

function smoothPanZoomTo(newScale,newTx,newTy,duration){
  newScale=clamp(newScale,0.02,30);
  zoomAnim={fromScale:scale,toScale:newScale,fromTx:tx,toTx:newTx,fromTy:ty,toTy:newTy,startTime:performance.now(),duration:duration||300};
  requestAnimationFrame(animateZoom);
}

// ── Zoom-to-fit ──
function zoomToFit(animated){
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  var valid=0;
  nodes.forEach(function(n){
    if(typeof n.x!=="number"||!isFinite(n.x))return;
    valid++;
    if(n.x<minX)minX=n.x;if(n.x>maxX)maxX=n.x;
    if(n.y<minY)minY=n.y;if(n.y>maxY)maxY=n.y;
  });
  if(valid===0){return}
  var pad=0.06;
  var gw=maxX-minX||100;
  var gh=maxY-minY||100;
  var cx=(minX+maxX)/2;
  var cy=(minY+maxY)/2;
  var sx=W*(1-2*pad)/gw;
  var sy=H*(1-2*pad)/gh;
  // Hard floor so a sprawling graph still renders nodes at a readable
  // size — user can pan to see anything outside the viewport.
  var MIN_FIT_SCALE=0.55;
  var ns=Math.max(MIN_FIT_SCALE,Math.min(sx,sy,10));
  var ntx=W/2-cx*ns;
  var nty=H/2-cy*ns;
  if(animated){smoothPanZoomTo(ns,ntx,nty,400)}
  else{scale=ns;tx=ntx;ty=nty;draw()}
}

function applyLayoutMode(restart){
  if(layoutMode==="story")computePipelineLayout();
  else computeRankedLayout();
  // story mode reuses the column-layout positioning machinery; both
  // "ranked" (by topological_rank) and "story" (by preprocessor.stage)
  // produce rankColumns and per-node _targetX/_targetY.
  if((layoutMode==="ranked"||layoutMode==="story")&&rankColumns.length>1){
    // Pin both axes in Story mode (computePipelineLayout already did
    // this but applyLayoutMode may be invoked after a flow-mode unpin,
    // so re-pin here defensively). Other layouts must unpin.
    if(layoutMode==="story"){
      nodes.forEach(function(n){
        if(typeof n._targetX==="number")n.fx=n._targetX;
        if(typeof n._targetY==="number")n.fy=n._targetY;
      });
    }else{
      nodes.forEach(function(n){n.fx=null;n.fy=null});
    }
    simulation.force("link").distance(linkDist).strength(0.2);
    simulation.force("charge").strength(repStr);
    simulation.force("x",d3.forceX(function(d){return d._targetX||0}).strength(0.22));
    simulation.force("y",d3.forceY(function(d){return d._targetY||0}).strength(0.08));
  }else{
    // Organic / Force mode — clear any pinned coords from a previous
    // Story-mode run so the simulation can move nodes anywhere.
    nodes.forEach(function(n){n.fx=null;n.fy=null});
    // Force-mode semantic tuning (Phase 1 polish, Codex critique). Three
    // signals layered on top of the legacy organic layout:
    //  - Per-link strength: structural relations are LOOSER (entities can
    //    drift away from their chunk-containment skeleton) so semantic
    //    edges aren't drowned out. Semantic links pull TIGHTER, surfacing
    //    real connections.
    //  - Per-node charge: hubs (high-degree nodes) repel more strongly
    //    proportional to log(degree), spreading them out so they stop
    //    occluding their neighbors.
    //  - Per-link distance: structural links allowed to stretch further.
    computeOrganicLayout();
    simulation.force("link")
      .distance(function(l){return l.edge_class==="semantic"?linkDist*0.9:linkDist*1.5})
      .strength(function(l){return l.edge_class==="semantic"?0.32:0.06});
    simulation.force("charge").strength(function(d){
      var deg=d._degree||0;
      return repStr*(1+Math.log(1+deg)*0.45);
    });
    simulation.force("x",d3.forceX(function(d){return d._organicX||0}).strength(0.075));
    simulation.force("y",d3.forceY(function(d){return d._organicY||0}).strength(0.075));
  }
  if(restart){
    simDone=false;
    simTickCount=0;
    simulation.alpha(0.8).restart();
    draw();
  }
}

// ── Quadtree (Phase 3a) ──
var quadtree=null;
var qtRebuildInterval=N>10000?10:N>2000?5:3;

function rebuildQuadtree(){
  quadtree=d3.quadtree()
    .x(function(d){return d.x})
    .y(function(d){return d.y})
    .addAll(nodes.filter(function(n){return typeof n.x==="number"&&isFinite(n.x)}));
}

// ── Adjacency index ──
var adjMap={};
nodes.forEach(function(n){adjMap[n.id]=[]});

// Simulation tick handler
simulation.on("tick",function(){
  simTickCount++;

  // Rebuild adjacency once after link objects are resolved
  if(simTickCount===1){
    adjMap={};
    nodes.forEach(function(n2){adjMap[n2.id]=[]});
    links.forEach(function(l){
      var sid=l.source.id||l.source;
      var tid=l.target.id||l.target;
      if(adjMap[sid])adjMap[sid].push(tid);
      if(adjMap[tid])adjMap[tid].push(sid);
    });
  }

  // Rebuild quadtree periodically
  if(simTickCount%qtRebuildInterval===0){rebuildQuadtree()}

  // Update loading progress
  if(showLoading&&!simDone){
    var pct=Math.min(99,Math.round(simTickCount/MAX_TICKS*100));
    loadingBar.style.width=pct+"%";
    loadingText.textContent="Laying out graph... "+pct+"%";
  }

  // Cap simulation ticks
  if(simTickCount>=MAX_TICKS&&!simDone){
    simulation.stop();
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
    return;
  }

  // Only draw during simulation if small graph, otherwise skip frames
  if(N<2000||simTickCount%3===0){draw()}
});

// When simulation ends naturally (alpha < alphaMin)
simulation.on("end",function(){
  if(!simDone){
    simDone=true;
    rebuildQuadtree();
    computeDensity();
    if(showLoading){
      loadingBar.style.width="100%";
      loadingText.textContent="Done!";
      setTimeout(function(){loadingOverlay.classList.add("hidden")},300);
    }
    zoomToFit(false);
    setupMinimap();
    draw();
  }
});
